services:
  openrouter-proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    container_name: pyagent-openrouter-proxy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PYAGENT_PROXY_API_KEY: ${PYAGENT_PROXY_API_KEY:-}
      OPENROUTER_MODEL_PRIMARY: ${OPENROUTER_MODEL_PRIMARY:-nvidia/nemotron-3-super-120b-a12b:free}
      OPENROUTER_MODEL_FALLBACK_1: ${OPENROUTER_MODEL_FALLBACK_1:-arcee-ai/trinity-large-preview:free}
      OPENROUTER_MODEL_FALLBACK_2: ${OPENROUTER_MODEL_FALLBACK_2:-openai/gpt-oss-120b:free}
      OPENROUTER_MODEL_FALLBACK_3: ${OPENROUTER_MODEL_FALLBACK_3:-nvidia/nemotron-3-nano-30b-a3b:free}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-45}

  hermes-agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    container_name: pyagent-hermes-agent
    restart: unless-stopped
    depends_on:
      - openrouter-proxy
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Kolkata}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: ${PYAGENT_PROXY_API_KEY:-changeme}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HERMES_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://pyagent-workspace:3000"
    volumes:
      - ./data/hermes:/root/.hermes
      - ./:/workspace
    working_dir: /workspace
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8642/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - '8642:8642'

  hermes-workspace:
    build:
      context: .
      dockerfile: docker/workspace/Dockerfile
    container_name: pyagent-workspace
    restart: unless-stopped
    depends_on:
      hermes-agent:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HERMES_API_URL: http://hermes-agent:8642
      HERMES_API_TOKEN: ${PYAGENT_PROXY_API_KEY:-changeme}
      PORT: 3000
    ports:
      - '3001:3000'
